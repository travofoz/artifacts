layout: null
title: Artifacts Directory
---
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Index</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0F1115] text-[#E2E8F0] p-6 font-mono max-w-2xl mx-auto">
    <h1 class="text-xl font-black text-emerald-400 border-b border-gray-800 pb-2 mb-4 uppercase tracking-wider">
        [ARTIFACTS INDEX // AUTOMATED REGISTRY]
    </h1>
    <ul class="space-y-2">
        {% for file in site.static_files %}
          {% if file.extname == ".html" %}
            <li class="bg-[#1A1D24] p-3 rounded border border-gray-800 hover:border-emerald-500 transition-colors">
              <a href="{{ site.baseurl }}{{ file.path }}" class="block text-sm font-bold text-gray-300 hover:text-emerald-400">
                📄 {{ file.name }}
              </a>
            </li>
          {% endif %}
        {% endfor %}
    </ul>
</body>
</html>
